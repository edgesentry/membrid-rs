name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_test:
    name: Build and Test (${{ matrix.os }}, ${{ matrix.features || 'default' }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu: one job per feature set, all run in parallel
          - os: ubuntu-latest
            features: ""
          - os: ubuntu-latest
            features: "store-lance"
          - os: ubuntu-latest
            features: "store-duck"
          - os: ubuntu-latest
            features: "store-lance store-duck"
          # macOS / Windows: pure Rust only -- avoids recompiling duckdb + lancedb C code
          - os: macos-latest
            features: ""
          - os: windows-latest
            features: ""

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Rust
        run: rustup show  # reads rust-toolchain.toml

      - name: Cache Rust artifacts
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ matrix.os }}-cargo-${{ matrix.features }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-${{ matrix.features }}-
            ${{ matrix.os }}-cargo-

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc --yes

      - name: Run tests
        shell: bash
        run: |
          if [ -n "$FEATURES" ]; then
            cargo test --features "$FEATURES"
          else
            cargo test
          fi
        env:
          FEATURES: ${{ matrix.features }}

  license_check:
    name: OSS License Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Rust
        run: rustup show

      - name: Cache Rust artifacts
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ubuntu-latest-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ubuntu-latest-cargo-

      - name: Install cargo-deny
        run: cargo deny --version 2>/dev/null || cargo install cargo-deny --locked

      - name: Check licenses
        run: cargo deny check licenses

  sast:
    name: SAST (Clippy + cargo-deny)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Rust
        run: rustup show

      - name: Cache Rust artifacts
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ubuntu-latest-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ubuntu-latest-cargo-

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Install cargo-deny
        run: cargo deny --version 2>/dev/null || cargo install cargo-deny --locked

      - name: Deny vulnerable advisories
        run: cargo deny check advisories

      - name: Deny policy violations (bans + sources)
        run: cargo deny check bans sources

  coverage:
    name: Test Coverage (cargo-llvm-cov)
    # Coverage is informational and slow (~15 min); run only on pushes to main.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Rust
        run: rustup show && rustup component add llvm-tools-preview

      - name: Cache Rust artifacts
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ubuntu-latest-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ubuntu-latest-cargo-coverage-
            ubuntu-latest-cargo-

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Install cargo-llvm-cov
        run: cargo llvm-cov --version 2>/dev/null || cargo install cargo-llvm-cov --locked

      - name: Generate coverage report
        run: |
          cargo llvm-cov \
            --features "store-lance store-duck" \
            --ignore-filename-regex '(main\.rs|examples/)' \
            --lcov \
            --output-path lcov.info

      - name: Upload lcov artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 30

      - name: Print summary
        run: |
          cargo llvm-cov \
            --features "store-lance store-duck" \
            --ignore-filename-regex '(main\.rs|examples/)' \
            --summary-only 2>/dev/null || true

  release_readiness:
    name: Release Readiness (dry-run)
    runs-on: ubuntu-latest
    needs: [build_and_test, license_check, sast]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Rust
        run: rustup show

      - name: Cache Rust artifacts
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ubuntu-latest-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ubuntu-latest-cargo-

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Publish dry-run
        run: cargo publish --dry-run --locked
