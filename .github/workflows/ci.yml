name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  build_and_test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: full suite including heavy C-compiled features
          - os: ubuntu-latest
            heavy_features: true
          # macOS / Windows: pure Rust only — avoids recompiling duckdb + lancedb C code
          - os: macos-latest
            heavy_features: false
          - os: windows-latest
            heavy_features: false

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Rust
        run: rustup show  # reads rust-toolchain.toml

      - name: sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad  # v0.0.9

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5  # v2.8.2
        with:
          key: ${{ matrix.os }}

      - name: Install protoc (Linux)
        if: ${{ matrix.heavy_features == true }}
        run: sudo apt-get install -y protobuf-compiler

      - name: Build (release)
        run: cargo build --release

      - name: Unit tests (default features)
        run: cargo test

      - name: Unit tests (store-lance)
        if: ${{ matrix.heavy_features == true }}
        run: cargo test --features store-lance

      - name: Unit tests (store-duck)
        if: ${{ matrix.heavy_features == true }}
        run: cargo test --features store-duck

      - name: Unit tests (all features)
        if: ${{ matrix.heavy_features == true }}
        run: cargo test --features "store-lance store-duck"

  license_check:
    name: OSS License Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Rust
        run: rustup show

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5  # v2.8.2

      - name: Install cargo-deny
        run: cargo deny --version 2>/dev/null || cargo install cargo-deny --locked

      - name: Check licenses
        run: cargo deny check licenses

  audit:
    name: Security Audit (cargo-audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Rust
        run: rustup show

      - name: Install cargo-audit
        run: cargo audit --version 2>/dev/null || cargo install cargo-audit --locked

      - name: Run security audit
        run: cargo audit

  sast:
    name: SAST (Clippy + cargo-deny advisories)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Rust
        run: rustup show

      - name: sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad  # v0.0.9

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5  # v2.8.2

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Install cargo-deny
        run: cargo deny --version 2>/dev/null || cargo install cargo-deny --locked

      - name: Deny vulnerable advisories
        run: cargo deny check advisories

      - name: Deny policy violations (bans + sources)
        run: cargo deny check bans sources

  coverage:
    name: Test Coverage (cargo-llvm-cov)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Rust
        run: rustup show && rustup component add llvm-tools-preview

      - name: sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad  # v0.0.9

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5  # v2.8.2

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Install cargo-llvm-cov
        run: cargo llvm-cov --version 2>/dev/null || cargo install cargo-llvm-cov --locked

      - name: Generate coverage report
        run: |
          cargo llvm-cov \
            --features "store-lance store-duck" \
            --ignore-filename-regex '(main\.rs|examples/)' \
            --lcov \
            --output-path lcov.info

      - name: Upload lcov artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 30

      - name: Print summary
        run: |
          cargo llvm-cov \
            --features "store-lance store-duck" \
            --ignore-filename-regex '(main\.rs|examples/)' \
            --summary-only 2>/dev/null || true

  release_readiness:
    name: Release Readiness (dry-run)
    runs-on: ubuntu-latest
    needs: [build_and_test, license_check, audit, sast]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Rust
        run: rustup show

      - name: sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad  # v0.0.9

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5  # v2.8.2

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Publish dry-run
        run: cargo publish --dry-run --locked
